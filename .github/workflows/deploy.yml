name: 🚀 Deploy Laravel to EC2 (C0-248-1.0.0-Web-Initialize)

on:
  push:
    branches:
      - C0-248-1.0.0-Web-Initialize
  workflow_dispatch: # Allow manual triggers

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  APP_NAME: 'boat-website'
  DEPLOY_PATH: '/var/www/boat-website'

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: boat_website_test
          MYSQL_USER: ${{ secrets.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: 🧾 Checkout code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, zip, curl, xml, ctype, json, tokenizer, xmlwriter, fileinfo, openssl, pcre, session, standard, mysqlnd, pdo
        coverage: xdebug

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 📋 Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: 📥 Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: 📥 Install NPM dependencies
      run: npm ci

    - name: 🏗️ Build assets
      run: npm run build

    - name: 🔑 Generate key
      run: php artisan key:generate

    - name: 📁 Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: 🧪 Execute tests
      env:
        DB_CONNECTION: mariadb
        DB_DATABASE: boat_website_test
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: php artisan test

    - name: 🎨 Run Laravel Pint
      run: ./vendor/bin/pint --test

  deploy:
    name: 🚀 Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: 🧾 Checkout code
      uses: actions/checkout@v4

    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, zip, curl, xml, ctype, json, tokenizer, xmlwriter, fileinfo, openssl, pcre, session, standard, mysqlnd, pdo

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: 📥 Install Composer dependencies
      run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

    - name: 📥 Install NPM dependencies
      run: npm ci

    - name: 🏗️ Build assets for production
      run: npm run build

    - name: 📦 Create deployment artifact
      run: |
        tar -czf ${{ env.APP_NAME }}-$(date +%Y%m%d-%H%M%S).tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='tests' \
          --exclude='.env.example' \
          --exclude='docker-compose.mariadb.yml' \
          --exclude='compose.yaml' \
          --exclude='*.md' \
          --exclude='phpunit.xml' \
          --exclude='.gitignore' \
          --exclude='.gitattributes' \
          --exclude='scripts' \
          .

    - name: 🔧 Prepare server for deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || 22 }}
        script: |
          echo "🔧 Preparing server for deployment..."
          
          # Create backup of current deployment
          if [ -d "${{ env.DEPLOY_PATH }}" ]; then
            echo "📦 Creating backup..."
            sudo cp -r ${{ env.DEPLOY_PATH }} ${{ env.DEPLOY_PATH }}-backup-$(date +%Y%m%d-%H%M%S)
            echo "✅ Backup created"
          fi
          
          # Create deployment directory if it doesn't exist
          sudo mkdir -p ${{ env.DEPLOY_PATH }}
          sudo chown -R ubuntu:ubuntu ${{ env.DEPLOY_PATH }}
          
          # Ensure required directories exist
          sudo mkdir -p /var/www/backups
          sudo mkdir -p /var/log/${{ env.APP_NAME }}
          
          echo "✅ Server prepared"

    - name: 📤 Upload files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || 22 }}
        source: "${{ env.APP_NAME }}-*.tar.gz"
        target: "/tmp/"

    - name: 🚀 Extract and deploy application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || 22 }}
        script: |
          echo "🚀 Starting deployment..."
          
          cd /tmp
          
          # Extract new deployment
          echo "📦 Extracting deployment package..."
          tar -xzf ${{ env.APP_NAME }}-*.tar.gz -C ${{ env.DEPLOY_PATH }}/
          rm ${{ env.APP_NAME }}-*.tar.gz
          
          cd ${{ env.DEPLOY_PATH }}
          
          # Set proper permissions
          echo "🔐 Setting permissions..."
          sudo chown -R www-data:www-data ${{ env.DEPLOY_PATH }}
          sudo chmod -R 755 ${{ env.DEPLOY_PATH }}
          sudo chmod -R 775 storage bootstrap/cache
          
          # Install/update Composer dependencies
          echo "📥 Installing Composer dependencies..."
          composer install --no-dev --optimize-autoloader --no-interaction
          
          # Copy environment file if it doesn't exist
          if [ ! -f .env ]; then
            echo "📋 Creating .env file..."
            cp .env.example .env
          fi
          
          # Generate application key if not set
          echo "🔑 Generating application key..."
          php artisan key:generate --force
          
          # Run database migrations
          echo "🗄️ Running database migrations..."
          php artisan migrate --force
          
          # Clear and cache configuration
          echo "⚡ Optimizing application..."
          php artisan config:clear
          php artisan config:cache
          php artisan route:clear
          php artisan route:cache
          php artisan view:clear
          php artisan view:cache
          
          # Clear application cache
          php artisan cache:clear
          
          # Restart services
          echo "🔄 Restarting services..."
          sudo systemctl reload nginx
          sudo systemctl restart php8.2-fpm
          
          # Clean up old backups (keep last 5)
          echo "🧹 Cleaning up old backups..."
          sudo ls -t ${{ env.DEPLOY_PATH }}-backup-* 2>/dev/null | tail -n +6 | sudo xargs -r rm -rf
          
          echo "✅ Deployment completed successfully!"

    - name: 🏥 Health check
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: ${{ secrets.EC2_PORT || 22 }}
        script: |
          echo "🏥 Performing health check..."
          
          # Check if services are running
          if systemctl is-active --quiet php8.2-fpm; then
            echo "✅ PHP-FPM is running"
          else
            echo "❌ PHP-FPM is not running"
            exit 1
          fi
          
          if systemctl is-active --quiet nginx; then
            echo "✅ Nginx is running"
          else
            echo "❌ Nginx is not running"
            exit 1
          fi
          
          # Check if application responds
          if curl -f -s "http://localhost" > /dev/null; then
            echo "✅ Application is responding"
          else
            echo "❌ Application health check failed"
            exit 1
          fi
          
          echo "🎉 All health checks passed!"

  notify:
    name: 📢 Notify Deployment Status
    needs: [test, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📢 Notify Success
      if: needs.deploy.result == 'success'
      run: |
        echo "🎉 Deployment successful!"
        echo "✅ Tests passed"
        echo "🚀 Application deployed to EC2"
        # Add your notification logic here (Slack, Discord, Email, etc.)
        
    - name: 📢 Notify Failure
      if: needs.deploy.result == 'failure' || needs.test.result == 'failure'
      run: |
        echo "❌ Deployment failed!"
        if [ "${{ needs.test.result }}" == "failure" ]; then
          echo "🧪 Tests failed"
        fi
        if [ "${{ needs.deploy.result }}" == "failure" ]; then
          echo "🚀 Deployment failed"
        fi
        # Add your notification logic here (Slack, Discord, Email, etc.)
